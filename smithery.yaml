# Smithery configuration file: https://smithery.ai/docs/config#smitheryyaml

startCommand:
  type: stdio
  configSchema:
    # JSON Schema defining the configuration options for the MCP server.
    type: object
    required:
      - apiKey
    properties:
      apiKey:
        type: string
        description: "Your Thunderbit API key (tb_...). Get one at https://app.thunderbit.com/console"
  commandFunction:
    # A function that produces the CLI command to start the MCP on stdio.
    |-
    (config) => ({ command: 'npx', args: ['-y', '@thunderbit/mcp-server'], env: { THUNDERBIT_API_KEY: config.apiKey } })
